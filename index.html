<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carnet Universitario - Universidad de Lima</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #ffffff;
      width: 260px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 18px 20px 18px;
      position: relative;
      overflow: hidden;
    }

    /* Número de página */
    .page-number {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 13px;
      color: #E8621A;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .page-number::before {
      content: '';
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #E8621A;
      margin-right: 4px;
    }

    /* Logo Universidad de Lima */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
      margin-top: 10px;
    }

    .logo-svg {
      width: 54px;
      height: 54px;
      margin-bottom: 6px;
    }

    .university-name {
      font-size: 9px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      letter-spacing: 1.5px;
      line-height: 1.4;
    }

    /* Nombre y código */
    .student-info {
      text-align: center;
      margin-bottom: 22px;
    }

    .student-name {
      font-size: 16px;
      font-weight: 400;
      color: #E8621A;
      line-height: 1.25;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .student-code {
      font-size: 22px;
      font-weight: 400;
      color: #E8621A;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Foto / Recuadro en blanco */
    .photo-container {
      width: 160px;
      height: 190px;
      position: relative;
      margin-bottom: 20px;
    }

    .photo-box {
      width: 100%;
      height: 100%;
      background: #ffffff;
      border: none;
    }


    /* Alumni */
    .alumni-label {
      font-size: 17px;
      font-weight: 400;
      color: #E8621A;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* Código de barras */
    .barcode {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 54px;
      gap: 0;
      padding: 0 4px;
    }

    .barcode-bar {
      display: inline-block;
      background: #111111;
      height: var(--h, 42px);
      width: var(--w, 2px);
      margin: 0 0.5px;
    }

    /* Barra escáner animada */
    .scanner-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 18px;
      background: #E8621A;
      opacity: 0.5;
      z-index: 10;
      top: 0;
      animation: scanAnimation 1.5s linear infinite alternate;
      pointer-events: none;
    }

    @keyframes scanAnimation {
      0% {
        top: 0;
      }

      100% {
        top: calc(100% - 18px);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- Barra escáner animada -->
    <div class="scanner-bar"></div>
    <!-- Número de página removido -->

    <!-- Logo -->
    <div class="logo-section">
      <img src="logo_ulima.png" alt="Universidad de Lima" style="width: 120px; height: auto;">
    </div>

    <!-- Nombre y código -->
    <div class="student-info">
      <div class="student-name">DOMINICH AZABACHE<br>KEVIN ANTONIO</div>
      <div class="student-code">20162003</div>
    </div>

    <!-- Foto -->
    <div class="photo-container">
      <img class="photo-box" src="IMAGEN_foto.png" alt="Foto del estudiante" style="object-fit: cover;">
    </div>

    <!-- Alumni -->
    <div class="alumni-label">ALUMNI</div>

    <!-- Código de barras -->
    <div class="barcode">
      <img src="codigo_barras.png" alt="Código de barras" style="width: 90%; height: 54px; object-fit: contain;">
    </div>
  </div>
</body>

</html>
